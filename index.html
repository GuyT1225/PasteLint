<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteLint — Fix Messy Text Instantly</title>
<meta name="description" content="Fix messy text from PDFs, Word, websites, and AI tools. Clean, readable output in seconds. No login. No upload.">
<link rel="canonical" href="https://guyt1225.github.io/pastelint/">
<link rel="stylesheet" href="styles.css">
</head>

<body data-theme="light">

<header class="site-header">
  <div class="header-brand"><a href="index.html">PasteLint</a></div>

  <div class="theme-toggle">
    <button data-theme="light">Light</button>
    <button data-theme="dark">Dark</button>
    <button data-theme="terminal">Terminal</button>
  </div>
</header>

<section class="hero">
  <h1>Fix messy text instantly.</h1>
  <p>Paste text from PDFs, Word, websites, or AI tools. Clean it up instantly.</p>
</section>

<main>

<section id="tool" class="tool-shell">

  <div class="tool-layout">

    <div class="textarea-block">
      <label>Original text</label>
      <textarea id="input"></textarea>
    </div>

    <div class="textarea-block">
      <label>Clean output</label>
      <textarea id="output" readonly></textarea>
    </div>

  </div>

  <div class="tool-actions">
    <button id="cleanBtn">Clean</button>
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
  </div>

  <!-- TRANSPARENCY PANEL -->
  <section id="diffPanel" class="diff-panel" hidden>

    <div class="diff-header">
      <h3>What PasteLint changed</h3>
    </div>

    <div id="diffSummary" class="diff-summary"></div>
    <div id="issueList" class="issue-list"></div>
    <div id="diffOutput" class="diff-output"></div>

  </section>

</section>

</main>

<footer class="site-footer">
  <p>PasteLint — browser-only text tools.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
